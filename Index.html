<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Tools - Free Online Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-align: center;
            padding: 30px;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .tool-tabs {
            display: flex;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 10px;
            gap: 10px;
            justify-content: center;
        }

        .tab-btn {
            background: white;
            border: 2px solid #e9ecef;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #495057;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        .tool-content {
            padding: 40px;
            min-height: 400px;
            display: none;
        }

        .tool-content.active {
            display: block;
        }

        .tool-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .result {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.3em;
            font-weight: 600;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .password-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .length-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .length-control input {
            width: 80px;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .tool-content {
                padding: 25px 20px;
            }

            .tool-card {
                padding: 25px 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .password-options {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 10px 18px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .tool-tabs {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Multi Tools</h1>
            <p>Free online tools for everyday calculations</p>
        </div>

        <div class="tool-tabs">
            <button class="tab-btn active" data-tool="age">📅 Age Calculator</button>
            <button class="tab-btn" data-tool="percentage">📊 Percentage</button>
            <button class="tab-btn" data-tool="emi">🏦 EMI Calculator</button>
            <button class="tab-btn" data-tool="password">🔐 Password Generator</button>
            <button class="tab-btn" data-tool="text">🔤 Text Converter</button>
        </div>

        <!-- Age Calculator -->
        <div id="age" class="tool-content active">
            <div class="tool-card">
                <h2 style="margin-bottom: 25px; color: #333; text-align: center;">Age Calculator</h2>
                <div class="form-row">
                    <div class="input-group">
                        <label>Birth Date</label>
                        <input type="date" id="birthDate" required>
                    </div>
                    <div class="input-group">
                        <label>Current Date (Optional)</label>
                        <input type="date" id="currentDate">
                    </div>
                </div>
                <button class="btn" onclick="calculateAge()">Calculate Age</button>
                <div id="ageResult" class="result"></div>
            </div>
        </div>

        <!-- Percentage Calculator -->
        <div id="percentage" class="tool-content">
            <div class="tool-card">
                <h2 style="margin-bottom: 25px; color: #333; text-align: center;">Percentage Calculator</h2>
                <div class="form-row">
                    <div class="input-group">
                        <label>Value</label>
                        <input type="number" id="value" placeholder="1000" step="any" required>
                    </div>
                    <div class="input-group">
                        <label>Total</label>
                        <input type="number" id="total" placeholder="5000" step="any" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Percentage (%)</label>
                    <input type="number" id="percentageValue" placeholder="20" step="any">
                </div>
                <button class="btn" onclick="calculatePercentage()">Calculate</button>
                <div id="percentageResult" class="result"></div>
            </div>
        </div>

        <!-- EMI Calculator -->
        <div id="emi" class="tool-content">
            <div class="tool-card">
                <h2 style="margin-bottom: 25px; color: #333; text-align: center;">EMI Calculator</h2>
                <div class="form-row">
                    <div class="input-group">
                        <label>Loan Amount (₹)</label>
                        <input type="number" id="loanAmount" placeholder="500000" step="any" required>
                    </div>
                    <div class="input-group">
                        <label>Interest Rate (% per year)</label>
                        <input type="number" id="interestRate" placeholder="8.5" step="0.01" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Loan Tenure (Years)</label>
                    <input type="number" id="tenure" placeholder="5" step="0.1" required>
                </div>
                <button class="btn" onclick="calculateEMI()">Calculate EMI</button>
                <div id="emiResult" class="result"></div>
            </div>
        </div>

        <!-- Password Generator -->
        <div id="password" class="tool-content">
            <div class="tool-card">
                <h2 style="margin-bottom: 25px; color: #333; text-align: center;">Password Generator</h2>
                <div class="input-group">
                    <label>Password Length</label>
                    <div class="length-control">
                        <input type="range" id="passwordLength" min="6" max="50" value="12">
                        <span id="lengthValue">12</span>
                    </div>
                </div>
                <div class="password-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="includeUppercase" checked>
                        <label for="includeUppercase">Uppercase</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="includeLowercase" checked>
                        <label for="includeLowercase">Lowercase</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="includeNumbers" checked>
                        <label for="includeNumbers">Numbers</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="includeSymbols">
                        <label for="includeSymbols">Symbols</label>
                    </div>
                </div>
                <button class="btn" onclick="generatePassword()">Generate Password</button>
                <div id="passwordResult" class="result">
                    <div id="generatedPassword"></div>
                    <button class="btn" onclick="copyPassword()" style="margin-top: 15px; font-size: 14px; padding: 10px 20px;">Copy Password</button>
                </div>
            </div>
        </div>

        <!-- Text Converter -->
        <div id="text" class="tool-content">
            <div class="tool-card">
                <h2 style="margin-bottom: 25px; color: #333; text-align: center;">Text Case Converter</h2>
                <div class="input-group">
                    <label>Enter Text</label>
                    <textarea id="inputText" rows="4" placeholder="Type your text here..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px;">
                    <button class="btn" onclick="convertText('uppercase')">UPPERCASE</button>
                    <button class="btn" onclick="convertText('lowercase')">lowercase</button>
                    <button class="btn" onclick="convertText('titlecase')">Title Case</button>
                    <button class="btn" onclick="convertText('sentencecase')">Sentence case</button>
                </div>
                <div id="textResult" class="result"></div>
            </div>
        </div>
    </div>

    <script>
        // Tab switching functionality
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tool = btn.dataset.tool;
                
                // Remove active class from all tabs and content
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tool-content').forEach(c => c.classList.remove('active'));
                
                // Add active class to clicked tab and corresponding content
                btn.classList.add('active');
                document.getElementById(tool).classList.add('active');
                
                // Hide all results
                document.querySelectorAll('.result').forEach(r => r.classList.remove('show'));
            });
        });

        // Age Calculator
        function calculateAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const currentDate = document.getElementById('currentDate').value ? 
                new Date(document.getElementById('currentDate').value) : new Date();
            
            if (!birthDate || isNaN(birthDate)) {
                alert('Please enter a valid birth date');
                return;
            }

            let ageInYears = currentDate.getFullYear() - birthDate.getFullYear();
            let monthDiff = currentDate.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && currentDate.getDate() < birthDate.getDate())) {
                ageInYears--;
            }

            const months = Math.abs(currentDate.getMonth() - birthDate.getMonth());
            const days = Math.floor((currentDate - birthDate) / (1000 * 60 * 60 * 24)) % 365;

            document.getElementById('ageResult').innerHTML = `
                Age: <strong>${ageInYears} years</strong><br>
                <small>${months} months, ${days
